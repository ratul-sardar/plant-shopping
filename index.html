    <!-- vanila css and js -->

    <link rel="stylesheet" href="./style/style.css" />
    <script src="./js/Call the Catagorys.js" defer></script>

    <!-- tailwindcss and daisyui -->

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Plant Shopping</title>

  <body class="bg-base-200 min-h-screen">
    <main class="container mx-auto p-4 md:p-8">
      <!-- Section with 2 rows -->
      <section class="flex flex-col gap-8">
        <!-- First row: H2 heading -->
        <div class="row-1">
          <h2 class="text-4xl font-extrabold text-success text-center">
            Choose Your Trees
          </h2>
        </div>

        <!-- Bottom row: Contents row with 5 cols -->
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
          <!-- First column (span 1): Categories -->
          <div
            class="col-span-1 bg-base-100 p-6 rounded-box shadow-sm border-t-4 border-success h-fit"
          >
            <h3
              class="text-xl font-bold text-success mb-4 pb-2 border-b border-base-300"
            >
              Categories
            </h3>
            <div id="category-container" class="flex flex-col gap-3">
              <button class="btn btn-success text-white w-full">
                All Trees
              </button>

              <div
                id="catagorysLoadingSpinner"
                class="hidden w-full h-full justify-center items-center"
              >
                <span class="loading loading-spinner loading-xl"></span>
              </div>

              <div id="dynamicButtons" class=""></div>
            </div>
          </div>

          <!-- Second column (span 3): Tree Cards -->
          <div class="col-span-1 lg:col-span-3">
            <!-- loading spinner -->
            <div
              id="treeLoadingSpinner"
              class="hidden w-full h-full justify-center items-center"
            >
              <span class="loading loading-spinner loading-xl"></span>
            </div>

            <!-- Card in 3 col manner -->
            <div
              id="dynamicTrees"
              class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"
            >

                </figure>
                <div class="card-body p-5">
                  <h2 class="card-title text-success">Evergreen Beauty</h2>
                  <p class="text-sm length-clamp-2 text-base-content/70">

                  </p>

                  <div class="flex justify-between items-end mt-4">
                    <span class="text-success font-semibold">Ficus Lyrata</span>

                      class="text-lg font-bold text-success-content bg-success/20 px-2 py-1 rounded"

                </div>

            </div>
          </div>

          <!-- Third column (span 1): Cart -->
          <div
            class="col-span-1 bg-base-100 p-6 rounded-box shadow-sm border-t-4 border-success h-fit flex flex-col"
          >
            <h3
              class="text-xl font-bold text-success mb-4 pb-2 border-b border-base-300"
            >
              Your Cart
            </h3>

            <!-- Cart Items -->
            <div class="flex flex-col gap-3 mb-6">
              <!-- Demo Card -->
              <div
                class="card bg-success/10 border border-success/30 shadow-sm p-4"
              >
                <h4 class="font-bold text-success">Evergreen Beauty</h4>

                <div class="flex justify-between items-center mt-2">
                  <p class="text-base-content/80 font-medium">$5000 x 1</p>
                  <button
                    class="btn btn-error btn-sm btn-circle text-white shadow-sm"
                    aria-label="Remove item"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      class="h-4 w-4"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke="currentColor"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M6 18L18 6M6 6l12 12"
                      />
                    </svg>
                  </button>
                </div>
              </div>
            </div>

            <!-- Total Price Section -->
            <div class="mt-auto pt-4 border-t border-base-300">
              <div
                class="flex justify-between items-center font-bold text-lg mb-4"
              >
                <span class="text-base-content">Total Price:</span>
                <span class="text-success">$5000</span>
              </div>
              <button class="btn btn-success text-white w-full">
                Checkout
              </button>
            </div>
          </div>
        </div>
      </section>
